<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>JIGARTHANDA — Soda Kadai Rush v5</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800;900&family=Anek+Tamil:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: radial-gradient(circle at 50% 18%, #f6ecd8 0%, #ead8b7 42%, #c8b18c 100%);
      font-family: "Nunito", "Anek Tamil", "Arial Rounded MT Bold", system-ui, sans-serif;
      touch-action: none;
    }
    body { display: flex; align-items: center; justify-content: center; }
    #gameShell {
      position: relative;
      width: min(100vw, calc(100vh * 480 / 760));
      height: min(100vh, calc(100vw * 760 / 480));
      max-width: 480px;
      max-height: 760px;
      border-radius: 18px;
      overflow: hidden;
      background: #f7efdf;
      box-shadow: 0 18px 60px rgba(66, 44, 34, .28);
    }
    canvas { width: 100%; height: 100%; display: block; }
    #namePanel {
      position: absolute; left: 50%; top: 57%; transform: translate(-50%, -50%);
      width: min(82%, 340px); padding: 18px;
      background: rgba(248, 240, 226, .98); border: 3px solid #7a3840; border-radius: 20px;
      box-shadow: 0 16px 44px rgba(140, 62, 0, .35); text-align: center;
      color: #3b2600; display: none; z-index: 10;
    }
    #namePanel h3 { font-size: 18px; margin-bottom: 8px; color: #7a3840; }
    #playerName {
      width: 100%; padding: 11px 12px; border: 2px solid #b58e68; border-radius: 14px;
      background: #fffaf1; color: #433127; outline: none; font-weight: 800; text-align: center;
      font-size: 16px; margin: 8px 0 12px; font-family: inherit;
    }
    #submitName {
      width: 100%; border: 0; border-radius: 14px; padding: 12px 10px;
      background: linear-gradient(#7a3840, #5d2830); color: white; font-weight: 900; font-size: 15px;
      cursor: pointer; font-family: inherit;
    }
  </style>
</head>
<body>
  <div id="gameShell">
    <canvas id="game" width="480" height="760"></canvas>
    <div id="namePanel">
      <h3>Submit your score</h3>
      <p>Local leaderboard for this device</p>
      <input id="playerName" maxlength="14" placeholder="Your name" />
      <button id="submitName">🏆 Add to leaderboard</button>
    </div>
  </div>

      if (state.rushTime > 0) { state.rushTime -= dt; if (state.rushTime <= 0) { state.rushName = ""; state.rushMult = 1; } }
      else { state.nextRush -= dt; if (state.nextRush <= 0) startRush(); }
      state.spawnTimer -= dt; const activeDelay = state.rushTime > 0 ? Math.max(1.35, state.spawnDelay * .52) : state.spawnDelay;
      if (state.spawnTimer <= 0) { spawnOrder(); state.spawnTimer = activeDelay; }
    }
    for (let i = state.orders.length - 1; i >= 0; i--) { const o = state.orders[i]; if (!state.assist) o.mood -= dt / o.maxPatience; else o.mood = Math.max(o.mood, .72); if (o.mood <= 0) walkout(i); }
  }
  function startRush() { const waves = [["EVENING RUSH",1.5],["SUMMER RUSH",2],["FESTIVAL RUSH",2.5]]; const wv = waves[Math.floor(state.elapsed / 45) % waves.length]; state.rushName = wv[0]; state.rushMult = wv[1]; state.rushTime = 22; state.nextRush = 52; addPopup(W/2, 276, `${state.rushName}! ×${state.rushMult}`, COLORS.red, 26, 1.2); }
  function spawnOrder(forceRecipe = null, forceSlot = null, forcePatience = null) {
    if (state.orders.length >= 4) return; const taken = new Set(state.orders.map(o => o.slot)); const free = forceSlot !== null ? forceSlot : [0,1,2,3].find(s => !taken.has(s)); if (free === undefined || taken.has(free)) return;
    const recipes = getAvailableRecipes(); const recipe = forceRecipe || recipes[Math.floor(Math.random() * recipes.length)]; const type = CUSTOMER_TYPES[Math.floor(Math.random() * CUSTOMER_TYPES.length)]; const patience = forcePatience || Math.max(8.5, type.patience - state.elapsed * .014 + (Math.random() * 1.6 - .8));
    state.orders.push({ id: Math.random().toString(36).slice(2), slot: free, recipe, step: 0, complete: false, wrong: 0, mood: 1, maxPatience: patience, customer: { type: type.type, tip: type.tip, line: type.line, shirt: type.shirt, skin: ["#ffd7be", "#f1c27d", "#c68642", "#8d5524", "#a0522d"][Math.floor(Math.random() * 5)], hair: ["#1a0a00", "#2d1b00", "#111111"][Math.floor(Math.random() * 3)] } });
    if (state.selected < 0) state.selected = state.orders.length - 1;
  }
  function selectOrder(idx) { if (idx >= 0 && idx < state.orders.length) state.selected = idx; }
  function getNextStationId() { const o = state.orders[state.selected]; return o && !o.complete ? o.recipe.steps[o.step] : null; }
  function tapStation(id) {
    const o = state.orders[state.selected]; if (!o || o.complete) { const idx = state.orders.findIndex(x => !x.complete); if (idx >= 0) state.selected = idx; return; }
    const expected = o.recipe.steps[o.step]; if (id === expected) { o.step++; addPopup([60,170,280,390][o.slot], 330, STATION_BY_ID[id].label, COLORS.tealDark, 14, .55); if (o.step >= o.recipe.steps.length) { o.complete = true; addPopup([60,170,280,390][o.slot], 334, "READY", COLORS.green, 15, .8); const next = state.orders.findIndex(x => !x.complete); if (next >= 0) state.selected = next; } }
    else { o.wrong++; state.mistakes++; state.combo = 0; o.mood = Math.max(0, o.mood - (state.assist ? .06 : .16)); addPopup(W/2, 370, "Wrong station!", COLORS.red, 16, .7); state.ripples.push({ x: W/2, y: H/2, r: 0, life: .25, color: "rgba(229,57,53,.15)", full: true }); }
  }
  function serveOrder(idx) {
    const o = state.orders[idx]; if (!o || !o.complete) return;
    const moodBonus = o.mood > .72 ? 110 : o.mood > .42 ? 55 : 0; const perfect = o.wrong === 0 ? 75 : 0; const comboBonus = state.combo * 24; const tipMult = o.customer.tip;
    const score = Math.floor((o.recipe.price * 12 + moodBonus + perfect + comboBonus) * state.rushMult * tipMult); const rupees = Math.floor((o.recipe.price + (moodBonus ? 7 : 0) + perfect / 25 + state.combo * 2) * state.rushMult * tipMult);
    state.score += score; state.rupees += rupees; state.served++; state.combo++; state.maxCombo = Math.max(state.maxCombo, state.combo); addPopup([60,170,280,390][o.slot], 570, `+${score}`, COLORS.trim, 18, .9); addPopup([60,170,280,390][o.slot], 606, ["Semma!", "Super!", "Romba nalla!", "Excellent!"][Math.floor(Math.random()*4)], COLORS.green, 12, .8);
    state.orders.splice(idx, 1); if (state.orders.length === 0) state.selected = -1; else state.selected = Math.min(state.selected, state.orders.length - 1);
    if (state.mode === "ftue") { if (state.served === 1) { spawnOrder(RECIPE_BY_ID.lemon, 1, 22); state.selected = state.orders.length - 1; addPopup(W/2, 250, "One more lesson order!", COLORS.trim, 18, 1.2); } else if (state.served >= 2) completeFtue(); }
  }
  function walkout(idx) {
    const o = state.orders[idx]; state.lives--; state.missed++; state.combo = 0; addPopup([60,170,280,390][o.slot], 570, "Missed!", COLORS.red, 14, .9); state.orders.splice(idx, 1); if (state.orders.length === 0) state.selected = -1; else state.selected = Math.min(state.selected, state.orders.length - 1); if (state.lives <= 0) { if (state.mode === "day") finishDay(false); else endArcadeRun(); }
  }
  function completeFtue() {
    progress.ftueCompleted = true; const unlocked = checkUnlocks({ served: state.served, missed: 0 }, true); progress.lifetimeDeliveries += state.served; saveProgress();
    state.dayResult = { title: "FTUE COMPLETE!", lines: ["Periyavar: Training mudinjudhu. From now, no assists.", "Raju: Ready ayya! Shop open pannalaam!"], unlocked };
    setScreen("dayResult");
  }
  function finishDay(completed) {
    if (state.runOver) return; state.runOver = true;
    const run = { score: state.score, rupees: state.rupees, served: state.served, maxCombo: state.maxCombo, time: Math.floor(state.elapsed), mistakes: state.mistakes, missed: state.missed };
    const dayClear = completed && state.served >= (state.dayNumber === 1 ? 10 : 0);
    progress.lifetimeDeliveries += state.served; progress.bestSingleDayRupees = Math.max(progress.bestSingleDayRupees, state.rupees); progress.bestScore = Math.max(progress.bestScore, state.score); if (dayClear) progress.daysCompleted++;
    let unlocked = checkUnlocks(run, dayClear); saveProgress();
    state.dayResult = { title: dayClear ? "DAY COMPLETE!" : "DAY FAILED", lines: [dayClear ? `Served ${state.served} customers and earned ₹${state.rupees}.` : `Served ${state.served}/${state.dayGoal}. Need better speed next time.`, state.missed === 0 ? "Perfect day: no missed deliveries!" : `${state.missed} customers left thirsty.`], unlocked, run, dayClear };
    setScreen("dayResult");
  }
  function endArcadeRun() {
    state.runOver = true; state.finalRun = { score: state.score, rupees: state.rupees, served: state.served, maxCombo: state.maxCombo, time: Math.floor(state.elapsed), mistakes: state.mistakes, missed: state.missed };
    progress.lifetimeDeliveries += state.served; progress.bestSingleDayRupees = Math.max(progress.bestSingleDayRupees, state.rupees); progress.bestScore = Math.max(progress.bestScore, state.score); checkUnlocks(state.finalRun, false); saveProgress();
    setTimeout(() => { setScreen("gameover"); showNamePanel(); }, 350);
  }

  function drawDayResult() {
    clearButtons(); drawSummerBg(); ctx.fillStyle = "rgba(255,250,225,.76)"; ctx.fillRect(0,0,W,H); const r = state.dayResult || { title: "DONE", lines: [], unlocked: [] };
    drawText(r.title, W/2, 82, 32, r.title.includes("FAILED") ? COLORS.red : COLORS.trim, "center", "900");
    roundRect(ctx, 30, 128, W - 60, 234, 18, COLORS.panel, "rgba(255,122,0,.42)", 2);
    r.lines.forEach((line, i) => drawWrapped(line, 54, 158 + i * 58, W - 108, 26, 17, COLORS.text, "left"));
    if (r.unlocked && r.unlocked.length) {
      drawText("NEW RECIPE UNLOCKED!", W/2, 400, 16, COLORS.green, "center", "900");
      r.unlocked.forEach((u, i) => drawRecipeCard(u, 142, 424 + i * 64, true, "AVAILABLE IN ARCADE"));
    } else drawText("No new recipe this time.", W/2, 430, 14, COLORS.muted, "center", "800");
    button("CONTINUE", 96, H - 102, 288, 52, () => { state.postDayIndex = Math.max(0, progress.daysCompleted - 1); setScreen("postDay"); }, { color: COLORS.trim, dark: COLORS.trimDark }); state.buttons.forEach(drawButton);
  }

  function drawGameOver() {
    clearButtons(); drawSummerBg(); ctx.fillStyle = "rgba(0,0,0,.50)"; ctx.fillRect(0,0,W,H); const run = state.finalRun || { score: 0, rupees: 0, served: 0, maxCombo: 0, time: 0, mistakes: 0, missed: 0 };
    roundRect(ctx, 20, 58, W - 40, H - 106, 20, COLORS.panel, "rgba(255,122,0,.65)", 2); drawText("ARCADE RUN OVER", W/2, 94, 26, COLORS.trim, "center", "900"); drawText("Submit to local leaderboard", W/2, 124, 13, COLORS.muted, "center", "800");
    drawText("SCORE", W/2, 166, 11, COLORS.muted, "center", "900"); drawText(run.score.toLocaleString(), W/2, 205, 42, COLORS.trim, "center", "900");
    const stats = [["₹", run.rupees, "rupees"], ["OK", run.served, "served"], ["x", run.maxCombo, "best combo"], ["T", formatTime(run.time), "time"], ["!", run.missed, "missed"]];
    stats.forEach((s, i) => { const col = i % 3, row = Math.floor(i / 3), x = 38 + col * 136, y = 248 + row * 78; roundRect(ctx, x, y, 120, 64, 12, COLORS.panel2, "rgba(255,122,0,.2)", 1); drawText(s[0], x + 60, y + 15, 16, COLORS.trim); drawFitText(String(s[1]), x + 60, y + 36, 104, 16, COLORS.text, "center", "900", 8); drawText(s[2], x + 60, y + 54, 8, COLORS.muted, "center", "900"); });
    drawText("Enter name below to save this run.", W/2, 408, 12, COLORS.text, "center", "800");
    button("🔄 RETRY", 58, H - 94, 164, 48, () => startArcade(), { color: COLORS.trim, dark: COLORS.trimDark }); button("🏠 MENU", 258, H - 94, 164, 48, () => setScreen("menu"), { color: COLORS.teal, dark: COLORS.tealDark }); state.buttons.forEach(drawButton);
  }
  function drawLeaderboard() {
    clearButtons(); drawSummerBg(); ctx.fillStyle = "rgba(255,250,225,.80)"; ctx.fillRect(0,0,W,H); roundRect(ctx, 22, 54, W - 44, H - 112, 18, COLORS.panel, "rgba(255,122,0,.55)", 2); drawText("LEADERBOARD", W/2, 88, 28, COLORS.trim, "center", "900");
    const scores = state.highScores.length ? state.highScores : loadScores();
    if (!scores.length) drawText("No scores yet. Play Arcade after FTUE.", W/2, 270, 15, COLORS.text, "center", "900");
    else { drawText("#", 48, 126, 10, COLORS.trim, "left", "900"); drawText("Name", 84, 126, 10, COLORS.trim, "left", "900"); drawText("Score", 286, 126, 10, COLORS.trim, "left", "900"); drawText("Combo", 386, 126, 10, COLORS.trim, "left", "900"); scores.slice(0,10).forEach((s,i) => { const y = 150 + i * 43; roundRect(ctx, 36, y, W - 72, 36, 8, i % 2 ? "#fff0be" : "#fff8df", null); drawText(i===0?"1" : i===1?"2" : i===2?"3" : `${i+1}`, 48, y+18, 12, COLORS.trim, "left", "900"); drawFitText((s.name||"Anon").slice(0,12), 84, y+18, 160, 12, COLORS.text, "left", "900", 8); drawText(Number(s.score||0).toLocaleString(), 286, y+18, 12, COLORS.trim, "left", "900"); drawText(`x${s.maxCombo||0}`, 398, y+18, 12, COLORS.green, "left", "900"); }); }
    button("← BACK", 140, H - 92, 200, 48, () => setScreen("menu"), { color: COLORS.trim, dark: COLORS.trimDark }); state.buttons.forEach(drawButton);
  }
  function drawEffects(dt) {
    for (let i = state.particles.length - 1; i >= 0; i--) { const p = state.particles[i]; p.life -= dt; p.y += p.vy * dt; if (p.life <= 0) { state.particles.splice(i,1); continue; } ctx.save(); ctx.globalAlpha = Math.max(0, p.life / p.maxLife); drawText(p.text, p.x, p.y, p.size, p.color, "center", "900"); ctx.restore(); }
    for (let i = state.ripples.length - 1; i >= 0; i--) { const r = state.ripples[i]; r.life -= dt; r.r += 520 * dt; if (r.life <= 0) { state.ripples.splice(i,1); continue; } ctx.save(); ctx.globalAlpha = Math.max(0, r.life/.25); ctx.fillStyle = r.color || "rgba(255,122,0,.2)"; if (r.full) ctx.fillRect(0,0,W,H); else { ctx.beginPath(); ctx.arc(r.x, r.y, r.r, 0, TAU); ctx.fill(); } ctx.restore(); }
  }
  function addPopup(x, y, text, color, size, life) { state.particles.push({ x, y, text, color, size, life, maxLife: life, vy: -38 }); }
  function formatTime(sec) { sec = Math.max(0, Math.ceil(sec)); return `${Math.floor(sec/60)}:${String(sec % 60).padStart(2,"0")}`; }

  function showNamePanel() { namePanel.style.display = "block"; playerNameInput.value = localStorage.getItem("jigarthanda_last_name") || ""; setTimeout(() => playerNameInput.focus(), 100); }
  function hideNamePanel() { namePanel.style.display = "none"; }
  submitNameBtn.addEventListener("click", () => { if (!state.finalRun || state.submitted) return; const name = (playerNameInput.value || "Anon").trim().slice(0,14) || "Anon"; localStorage.setItem("jigarthanda_last_name", name); saveScore({ name, ...state.finalRun }); state.submitted = true; submitNameBtn.textContent = "✓ Submitted!"; setTimeout(() => { hideNamePanel(); setScreen("leaderboard"); submitNameBtn.textContent = "🏆 Add to leaderboard"; }, 650); });

  function handleTap(px, py) {
    for (let i = state.buttons.length - 1; i >= 0; i--) { const b = state.buttons[i]; if (px >= b.x && px <= b.x+b.w && py >= b.y && py <= b.y+b.h) { if (!b.disabled) { state.ripples.push({ x: px, y: py, r: 0, life: .25 }); b.action(); } return; } }
    if (state.screen === "story") { state.storyIndex++; if (state.storyIndex >= INTRO_STORY.length) startFtue(); return; }
    if (state.screen === "postDay") { setScreen("menu"); return; }
    if (state.screen === "game") {
      const xs = [60,170,280,390];
      for (let i = 0; i < state.orders.length; i++) { const o = state.orders[i], x = xs[o.slot]; if (px >= x - 46 && px <= x + 46 && py >= 334 && py <= 466) { if (o.complete) serveOrder(i); else selectOrder(i); return; } }
      for (let i = 0; i < state.orders.length; i++) { const x = xs[state.orders[i].slot]; if (px >= x - 52 && px <= x + 52 && py >= 510 && py <= 742) { if (state.orders[i].complete) serveOrder(i); else selectOrder(i); return; } }
      for (const s of stationRects()) if (px >= s.x - s.w/2 && px <= s.x+s.w/2 && py >= s.y-s.h/2 && py <= s.y+s.h/2+8) { tapStation(s.id); return; }
    }
  }
  function pointerToCanvas(e) { const r = canvas.getBoundingClientRect(); return { x: (e.clientX - r.left) * (W / r.width), y: (e.clientY - r.top) * (H / r.height) }; }
  canvas.addEventListener("pointerdown", e => { const p = pointerToCanvas(e); handleTap(p.x, p.y); e.preventDefault(); });

  function loop(ts) {
    const dt = Math.min(.05, (ts - state.lastTs) / 1000 || .016); state.lastTs = ts; state.t += dt; ctx.clearRect(0,0,W,H);
    if (state.screen === "boot") drawBoot(dt); else if (state.screen === "menu") drawMenu(); else if (state.screen === "howto") drawHowTo(); else if (state.screen === "recipes") drawRecipes(); else if (state.screen === "story") drawStory(); else if (state.screen === "postDay") drawPostDayScene(); else if (state.screen === "game") drawGame(dt); else if (state.screen === "dayResult") drawDayResult(); else if (state.screen === "gameover") drawGameOver(); else if (state.screen === "leaderboard") drawLeaderboard();
    requestAnimationFrame(loop);
  }
  state.highScores = loadScores(); requestAnimationFrame(loop);
})();
